openapi: 3.1.0
info:
  title: API сервер для демо-проекта «Шесть городов».
  description: |-
    * Список ресурсов и маршрутов сервера «Шесть городов».
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 2.0.0
tags:
  - name: offers
    description: Действия с объявлениями.
  - name: comments
    description: Действия с комментариями.
  - name: users
    description: Действия с пользователем.

paths:
  /users/register:
    post:
      tags:
        - users
      summary: Регистрация пользователя
      description: Регистрирует нового пользователя.

      requestBody:
        description: Информация для создания нового пользователя.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createUser'
        required: true

      responses:
        "201":
          description: Пользователь зарегистрирован. Объект пользователя.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user'
        "400":
          description: Ошибка валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationError'
        "409":
          description: Пользователь с таким email уже существует.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/conflictError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

  /users/login:
    post:
      tags:
        - users
      summary: Авторизация пользователя
      description: Авторизует пользователя на основе логина и пароля. Возвращает объект пользователя с JWT-токеном.
      requestBody:
        description: Информация для авторизации пользователя.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/loginUser'
        required: true

      responses:
        "200":
          description: Пользователь авторизован. Объект пользователя с токеном.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/loggedUser'
        "400":
          description: Ошибка валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationError'
        "401":
          description: Неверный логин или пароль.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

  /users/{userId}/avatar:
    post:
      tags:
        - users
      summary: Загрузить изображение аватара
      description: Загружает изображение аватара пользователя. Изображение
        аватара должно быть в формате `png` или `jpg`. Требует авторизации.
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        description: Изображение аватара.
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
        required: true
      responses:
        "201":
          description: Аватар загружен. Объект пользователя.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user'
        "400":
          description: Ошибка валидации данных. Неверный формат файла.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationError'
        "401":
          description: Пользователь не авторизован.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

  /offers:
    get:
      tags:
        - offers
      summary: Получить список объявлений
      description: Получает список объявлений.
      parameters:
        - name: limit
          in: query
          required: false
          description: Максимальное количество объявлений.
          schema:
            type: integer
            default: 60
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Список объявлений.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/offer'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

    post:
      tags:
        - offers
      summary: Создать объявление
      description: Создает новое объявление. Доступно только авторизованным пользователям.
      requestBody:
        description: Информация для создания нового объявления.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createOffer'
        required: true
      responses:
        "201":
          description: Объявление создано. Объект объявления.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/offer'
        "400":
          description: Ошибка валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationError'
        "401":
          description: Пользователь не авторизован. Создание объявления доступно только авторизованным пользователям.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

  /offers/{offerId}:
    get:
      tags:
        - offers
      summary: Получить детальную информацию об объявлении
      description: Получает детальную информацию об объявлении по ID.
      parameters:
        - $ref: '#/components/parameters/offerId'
      responses:
        "200":
          description: Детальная информация об объявлении.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/offer'
        "404":
          description: Объявление не найдено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notFoundError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

    patch:
      tags:
        - offers
      summary: Обновить объявление
      description: Обновляет объявление. Доступно только авторизованным пользователям. Редактировать можно только свои объявления.
      parameters:
        - $ref: '#/components/parameters/offerId'
      requestBody:
        description: Информация для обновления объявления.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateOffer'
        required: true
      responses:
        "200":
          description: Объявление обновлено. Объект объявления.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/offer'
        "400":
          description: Ошибка валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationError'
        "401":
          description: Пользователь не авторизован. Редактирование объявления доступно только авторизованным пользователям.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedError'
        "403":
          description: Доступ запрещён. Редактировать можно только свои объявления.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/forbiddenError'
        "404":
          description: Объявление не найдено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notFoundError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

    delete:
      tags:
        - offers
      summary: Удалить объявление
      description: Удаляет объявление. Доступно только авторизованным пользователям. Удалить можно только свои объявления.
      parameters:
        - $ref: '#/components/parameters/offerId'
      responses:
        "204":
          description: Объявление удалено.
        "401":
          description: Пользователь не авторизован. Удаление объявления доступно только авторизованным пользователям.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedError'
        "403":
          description: Доступ запрещён. Удалить можно только свои объявления.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/forbiddenError'
        "404":
          description: Объявление не найдено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notFoundError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

  /offers/{offerId}/comments:
    get:
      tags:
        - comments
      summary: Получить список комментариев к объявлению
      description: Получает список комментариев к объявлению.
      parameters:
        - $ref: '#/components/parameters/offerId'
        - name: limit
          in: query
          required: false
          description: Максимальное количество комментариев.
          schema:
            type: integer
      responses:
        "200":
          description: Список комментариев к объявлению.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/comment'
        "404":
          description: Объявление не найдено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notFoundError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

  /offers/{offerId}/images:
    post:
      tags:
        - offers
      summary: Загрузить фотографию объявления
      description: Загружает фотографию к объявлению. Требует авторизации.
      parameters:
        - $ref: '#/components/parameters/offerId'
      requestBody:
        description: Файл изображения.
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
        required: true
      responses:
        "201":
          description: Изображение загружено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/uploadImageResponse'
        "400":
          description: Файл изображения не передан или неверный формат.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationError'
        "401":
          description: Пользователь не авторизован.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedError'
        "404":
          description: Объявление не найдено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notFoundError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

  /offers/{offerId}/preview-image:
    post:
      tags:
        - offers
      summary: Загрузить превью-изображение объявления
      description: Загружает превью-изображение к объявлению. Требует авторизации.
      parameters:
        - $ref: '#/components/parameters/offerId'
      requestBody:
        description: Файл превью-изображения.
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                previewImage:
                  type: string
                  format: binary
        required: true
      responses:
        "201":
          description: Превью-изображение загружено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/uploadImageResponse'
        "400":
          description: Файл изображения не передан или неверный формат.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationError'
        "401":
          description: Пользователь не авторизован.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedError'
        "404":
          description: Объявление не найдено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notFoundError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

  /comments:
    post:
      tags:
        - comments
      summary: Добавить комментарий к объявлению
      description: Добавляет комментарий к объявлению. Доступно только авторизованным пользователям.
      requestBody:
        description: Информация для создания нового комментария.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createComment'
        required: true
      responses:
        "201":
          description: Комментарий добавлен. Объект комментария.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/comment'
        "400":
          description: Ошибка валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/validationError'
        "401":
          description: Пользователь не авторизован. Добавление комментария доступно только авторизованным пользователям.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/unauthorizedError'
        "500":
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/serverError'

components:
  parameters:
    offerId:
      name: offerId
      in: path
      required: true
      description: Уникальный идентификатор объявления.
      schema:
        type: string
        example: 6329c3d6a04ab1061c6425ea

    userId:
      name: userId
      in: path
      required: true
      description: Уникальный идентификатор пользователя.
      schema:
        type: string
        example: 6329c3d6a04ab1061c6425ea

  schemas:
    # === Пользователи ===
    createUser:
      type: object
      required:
        - email
        - firstName
        - lastName
        - password
        - account
      properties:
        email:
          type: string
          format: email
          example: keks@htmlacademy.ru
        firstName:
          type: string
          minLength: 1
          maxLength: 15
          example: Keks
        lastName:
          type: string
          minLength: 1
          maxLength: 64
          example: Ivanov
        password:
          type: string
          minLength: 6
          maxLength: 12
          example: '123456'
        account:
          type: string
          enum:
            - base
            - pro
          example: base
        avatarPath:
          type: string
          example: 'avatar.jpg'

    loginUser:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: keks@htmlacademy.ru
        password:
          type: string
          example: '123456'

    user:
      type: object
      properties:
        email:
          type: string
          format: email
          example: keks@htmlacademy.ru
        firstName:
          type: string
          example: Keks
        lastName:
          type: string
          example: Ivanov
        avatarPath:
          type: string
          example: 'http://localhost:4000/upload/avatar.jpg'
        account:
          type: string
          enum:
            - base
            - pro
          example: base

    loggedUser:
      type: object
      description: Объект авторизованного пользователя с JWT-токеном.
      properties:
        token:
          type: string
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        email:
          type: string
          format: email
          example: keks@htmlacademy.ru
        firstName:
          type: string
          example: Keks
        lastName:
          type: string
          example: Ivanov
        avatarPath:
          type: string
          example: 'http://localhost:4000/upload/avatar.jpg'

    # === Объявления ===
    offer:
      type: object
      description: Информация об объявлении.
      properties:
        id:
          type: string
          example: 6329c3d6a04ab1061c6425ea
        title:
          type: string
          example: 'Уютная квартира в центре Парижа'
        price:
          type: number
          example: 150
        housingType:
          type: string
          enum:
            - Apartment
            - House
            - Room
            - Hotel
          example: 'Apartment'
        isFavorite:
          type: boolean
          example: false
        createdDate:
          type: string
          format: date-time
          example: '2026-01-17T10:00:00.000Z'
        city:
          type: string
          enum:
            - Paris
            - Cologne
            - Brussels
            - Amsterdam
            - Hamburg
            - Dusseldorf
          example: 'Paris'
        previewImage:
          type: string
          example: 'http://localhost:4000/upload/preview.jpg'
        isPremium:
          type: boolean
          example: true
        rating:
          type: number
          format: float
          minimum: 0
          maximum: 5
          example: 4.5
        commentsCount:
          type: integer
          example: 10
        user:
          $ref: '#/components/schemas/user'

    createOffer:
      type: object
      required:
        - title
        - description
        - createdDate
        - city
        - previewImage
        - images
        - type
        - isPremium
        - isFavorite
        - housingType
        - roomsCount
        - visitorsCount
        - price
        - amenities
        - coordinates
        - rating
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
          example: 'Уютная квартира в центре Парижа'
        description:
          type: string
          minLength: 20
          maxLength: 1024
          example: 'Просторная квартира с видом на Эйфелеву башню.'
        createdDate:
          type: string
          format: date-time
          example: '2026-01-17T10:00:00.000Z'
        city:
          type: string
          enum:
            - Paris
            - Cologne
            - Brussels
            - Amsterdam
            - Hamburg
            - Dusseldorf
          example: 'Paris'
        previewImage:
          type: string
          example: 'https://example.com/preview.jpg'
        images:
          type: array
          items:
            type: string
          example:
            - 'https://example.com/img1.jpg'
            - 'https://example.com/img2.jpg'
        type:
          type: string
          enum:
            - Buy
            - Sell
          example: 'Buy'
        isPremium:
          type: boolean
          example: true
        isFavorite:
          type: boolean
          example: false
        housingType:
          type: string
          enum:
            - Apartment
            - House
            - Room
            - Hotel
          example: 'Apartment'
        roomsCount:
          type: integer
          minimum: 1
          maximum: 8
          example: 3
        visitorsCount:
          type: integer
          minimum: 1
          maximum: 10
          example: 4
        price:
          type: number
          minimum: 100
          maximum: 100000
          example: 150
        amenities:
          type: array
          items:
            type: string
            enum:
              - Breakfast
              - AirConditioning
              - LaptopFriendly
              - Workspace
              - BabySeat
              - Washer
              - Towels
              - Fridge
          example:
            - Breakfast
            - AirConditioning
        coordinates:
          type: object
          required:
            - latitude
            - longitude
          properties:
            latitude:
              type: number
              example: 48.8566
            longitude:
              type: number
              example: 2.3522
        rating:
          type: number
          minimum: 0
          maximum: 5
          example: 4.5

    updateOffer:
      type: object
      description: Все поля опциональны — можно обновить только нужные.
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
          example: 'Обновлённое название'
        description:
          type: string
          minLength: 20
          maxLength: 1024
          example: 'Обновлённое описание квартиры.'
        createdDate:
          type: string
          format: date-time
          example: '2026-01-17T10:00:00.000Z'
        city:
          type: string
          enum:
            - Paris
            - Cologne
            - Brussels
            - Amsterdam
            - Hamburg
            - Dusseldorf
          example: 'Paris'
        previewImage:
          type: string
          example: 'https://example.com/new-preview.jpg'
        images:
          type: array
          items:
            type: string
        type:
          type: string
          enum:
            - Buy
            - Sell
          example: 'Buy'
        isPremium:
          type: boolean
          example: false
        isFavorite:
          type: boolean
          example: false
        housingType:
          type: string
          enum:
            - Apartment
            - House
            - Room
            - Hotel
          example: 'House'
        roomsCount:
          type: integer
          minimum: 1
          maximum: 8
          example: 4
        visitorsCount:
          type: integer
          minimum: 1
          maximum: 10
          example: 6
        price:
          type: number
          minimum: 100
          maximum: 100000
          example: 200
        amenities:
          type: array
          items:
            type: string
            enum:
              - Breakfast
              - AirConditioning
              - LaptopFriendly
              - Workspace
              - BabySeat
              - Washer
              - Towels
              - Fridge
        coordinates:
          type: object
          properties:
            latitude:
              type: number
              example: 48.8566
            longitude:
              type: number
              example: 2.3522
        rating:
          type: number
          minimum: 0
          maximum: 5
          example: 4.0

    uploadImageResponse:
      type: object
      properties:
        previewImage:
          type: string
          example: 'http://localhost:4000/upload/preview.jpg'
        images:
          type: array
          items:
            type: string
          example:
            - 'http://localhost:4000/upload/img1.jpg'

    # === Комментарии ===
    comment:
      type: object
      properties:
        id:
          type: string
          example: 6329c3d6a04ab1061c6425ea
        comment:
          type: string
          minLength: 5
          maxLength: 1024
          example: 'Отличное место! Рекомендую всем!'
        rating:
          type: number
          minimum: 1
          maximum: 5
          example: 5
        createdDate:
          type: string
          format: date-time
          example: '2026-01-17T10:00:00.000Z'
        user:
          $ref: '#/components/schemas/user'

    createComment:
      type: object
      required:
        - comment
        - rating
        - userId
        - offerId
      properties:
        comment:
          type: string
          minLength: 5
          maxLength: 1024
          example: 'Отличное место! Рекомендую всем!'
        rating:
          type: number
          minimum: 1
          maximum: 5
          example: 5
        userId:
          type: string
          example: 6329c3d6a04ab1061c6425ea
        offerId:
          type: string
          example: 6329c3d6a04ab1061c6425ea

    # === Ошибки ===
    validationError:
      type: object
      properties:
        errorType:
          type: string
          example: 'VALIDATION_ERROR'
        message:
          type: string
          example: 'Ошибка валидации данных'
        details:
          type: array
          items:
            type: object
            properties:
              property:
                type: string
                example: 'email'
              value:
                type: string
                example: 'invalid-email'
              messages:
                type: array
                items:
                  type: string
                example:
                  - 'email must be a valid email address'

    unauthorizedError:
      type: object
      properties:
        errorType:
          type: string
          example: 'UNAUTHORIZED'
        message:
          type: string
          example: 'Пользователь не авторизован'

    forbiddenError:
      type: object
      properties:
        errorType:
          type: string
          example: 'FORBIDDEN'
        message:
          type: string
          example: 'Доступ запрещён. У вас нет прав для выполнения этого действия.'

    notFoundError:
      type: object
      properties:
        errorType:
          type: string
          example: 'NOT_FOUND'
        message:
          type: string
          example: 'Ресурс не найден'

    conflictError:
      type: object
      properties:
        errorType:
          type: string
          example: 'CONFLICT'
        message:
          type: string
          example: 'Пользователь с таким email уже существует'

    serverError:
      type: object
      properties:
        errorType:
          type: string
          example: 'INTERNAL_SERVER_ERROR'
        message:
          type: string
          example: 'Внутренняя ошибка сервера'
